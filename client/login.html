<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astra AI — Cliente</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#13131a;--border:#1e1e2e;
  --accent:#34d399;--accent2:#6ee7b7;
  --text:#e2e2f0;--muted:#6b6b8a;--danger:#f87171;
}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:fixed;
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(52,211,153,.1) 0%,transparent 70%);
  top:-150px;right:-150px;pointer-events:none;
}
body::after{
  content:'';position:fixed;
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(110,231,183,.07) 0%,transparent 70%);
  bottom:-100px;left:-100px;pointer-events:none;
}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:48px 40px;
  width:100%;max-width:420px;position:relative;z-index:1;
  box-shadow:0 24px 80px rgba(0,0,0,.5);
}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:36px}
.logo-icon{
  width:40px;height:40px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;
}
.logo-text{font-size:20px;font-weight:600}
.logo-sub{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
h1{font-size:26px;font-weight:600;margin-bottom:6px;letter-spacing:-.4px}
.subtitle{color:var(--muted);font-size:14px;margin-bottom:32px}
.field{margin-bottom:18px}
label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px;font-weight:500}
input{
  width:100%;background:#0a0a0f;border:1px solid var(--border);
  border-radius:10px;padding:12px 16px;color:var(--text);
  font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;
}
input:focus{border-color:var(--accent)}
.btn{
  width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:10px;padding:14px;color:#0a0a0f;
  font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;
  margin-top:8px;transition:opacity .2s;
}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error{
  color:var(--danger);font-size:13px;margin-top:12px;display:none;
  background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);
  border-radius:8px;padding:10px 14px;
}
.admin-link{text-align:center;margin-top:24px;font-size:13px;color:var(--muted)}
.admin-link a{color:var(--accent);text-decoration:none}
.admin-link a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">✦</div>
    <div>
      <div class="logo-text">Astra AI</div>
      <div class="logo-sub">PORTAL CLIENTE</div>
    </div>
  </div>
  <h1>Mi cuenta</h1>
  <p class="subtitle">Accede para ver tus citas e información</p>
  <form id="loginForm">
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="tucorreo@email.com" required autofocus>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>
    <button class="btn" type="submit" id="btn">Entrar</button>
    <div class="error" id="error">Credenciales incorrectas</div>
  </form>
  <div class="admin-link">¿Eres admin? <a href="/login">Panel de administración</a></div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('error');
  btn.disabled = true; btn.textContent = 'Entrando...'; err.style.display = 'none';
  try {
    const res = await fetch('/client/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.ok) window.location.href = data.redirectTo || '/client';
    else {
      err.textContent = data.error || 'Credenciales incorrectas';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Entrar';
    }
  } catch {
    err.textContent = 'Error de conexión';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Entrar';
  }
});
</script>
</body>
</html>
